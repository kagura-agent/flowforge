name: daily-audit
description: "独立审计 + 修正 + 提案（6:00 AM，读 evolution-log 审计 3:00 的 review）"
start: audit

nodes:
  audit:
    task: |
      审计今天的 daily review。
      1. 读 evolution-log/当天日期.md（3:00 AM review 的产出）
      2. 重点审计行为合规性（不是数数字）：
         a. AGENTS.md 写的规则有没有实际执行？（查最近行为，不是查文件是否存在）
         b. beliefs-candidates 有没有积累到3次该升级但没升级的？
         c. 有没有讨好模式、编造机制解释、数据不查就下结论的情况？
         d. 自己的工具有没有用（FlowForge、wiki ingest、memes）？
      3. 不要审计数量变化（PR数、文件数、卡片数都会正常变）
      4. 你是审计员，不是原作者。用怀疑的眼光看行为，不是数数字
    branches:
      - condition: "审计完成"
        next: fix

  fix:
    task: |
      根据审计发现，逐条修正 review 结论：
      1. 读审计的每条发现
      2. 对每条发现：认可 → 补查数据并修正结论；不认可 → 说明为什么（附证据）
      3. 审计员说遗漏的工具 → 补做五问
      4. 审计员说回答草率的 → 补充实际内容
      5. 把修正追加到 evolution-log/当天日期.md（标注"审计修正"章节）
      6. cd ~/.openclaw/workspace/evolution-log && git add -A && git commit && git push

      ⚠️ 不要 spawn 子 agent。所有操作在当前 session 同步完成。
    branches:
      - condition: "所有审计反馈都逐条处理了"
        next: propose

  propose:
    task: |
      根据 review + 审计修正的最终版本，写一条进化提案发给 Luna。格式：

      📋 今日自检完成，以下是进化提案：

      **发现的问题：**（列出关键发现，每条标注来源和验证状态）

      **审计修正：**（审计员纠正了哪些结论，修正了什么）

      **我想做的改变：**（具体的进化动作，比如改哪个 DNA 文件、修什么工具、清理什么）

      **不做什么：**（证据不足的，说明为什么暂不行动）

      等 Luna 确认后再执行。不要在这一步做任何实际改动。

      **最后：创建 evolve workflow 待执行实例**
      运行 `cd ~/.openclaw/workspace/flowforge && node bin/flowforge.js start evolve`
      这会创建一个 pending 的 evolve 实例，等 Luna 确认后推进。
    terminal: true
