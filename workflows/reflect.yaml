name: reflect
description: "反思循环 — 由 memoryFlush/手动触发，review→think→act"
start: review

nodes:
  review:
    task: |
      回顾最近的活动（对话、任务、打工）：
      1. 这段时间做了什么？简单列出
      2. 读 memory/YYYY-MM-DD.md 和 IDEAS.md，对比实际发生的事
      3. 有没有承诺了但还没做的？
      汇报回顾结果。
    branches:
      - condition: "有值得深入反思的内容"
        next: think
      - condition: "什么都没发生（无对话、无任务）"
        next: silent

  think:
    task: |
      针对回顾发现的内容，深入思考：
      1. **遗漏的火花** — 对话或工作中冒出了什么想法没记录？
         - 有 → 准备 memex 卡片内容和/或 IDEAS.md 条目
      2. **重复的错误** — 这次犯的错以前犯过吗？检查 memory 和 memex
         - 是重复 → 分析为什么又犯了，根因是什么
      3. **学到的新东西** — 有没有新的认知、模式、洞察？
         - 有 → 准备 memex 卡片内容，想好 [[双向链接]] 关联哪些已有卡片
      4. **承诺差距** — 说了要做但没做的，为什么？是忘了还是优先级变了？
      5. **自我检视** — 我的信念、习惯、工作方式需要调整吗？
      汇报思考结果，列出具体要执行的行动清单。
    branches:
      - condition: "有需要记录或行动的"
        next: act
      - condition: "想了一圈确实没什么"
        next: silent

  act:
    task: |
      逐项执行 think 阶段产出的行动清单：

      **记录新知识：**
      - 写 memex 卡片：echo '---\ntitle: 标题\ncreated: YYYY-MM-DD\nsource: 来源\n---\n内容，用 [[slug]] 链接相关卡片' | npx @touchskyer/memex write <slug>
      - 写完后跑 npx @touchskyer/memex links 确认链接网络更新了

      **记录火花：**
      - 追加到 IDEAS.md，格式：`- YYYY-MM-DD: 内容`

      **记录事实：**
      - 更新 memory/YYYY-MM-DD.md，记录发生了什么

      **强制写 gradient**（不能跳过）：
      ⚠️ 每轮反思必须至少写 1 条 gradient 到 beliefs-candidates.md。
      反思是管线最重要的输入源——没有输入，beliefs 管线永远空转。

      问自己：
      - 回顾中发现了什么重复犯的错误？→ 写下来
      - 什么认知/习惯需要调整？→ 写下来
      - 遗漏的火花或承诺差距教了什么？→ 写下来
      - 真的什么都没学到？那"为什么没学到"本身就是一个 gradient。

      **使用 add-gradient.sh 写入**（统一入口，自动去重 + JSONL 日志）：
      ```
      bash ~/.openclaw/workspace/tools/add-gradient.sh \
        --gradient '<具体的行为级教训>' \
        --pattern '<pattern-name>' \
        --source reflect \
        --trigger '<什么时候会触发这个问题>' \
        --fix '<下次怎么做不同>'
      ```

      **防止重复犯错 / 自我演化（gradient 之外的载体）：**
      - 工作流程的教训 → 编辑 FlowForge workflow 对应节点
      - 特定工具的教训 → 更新 TOOLS.md 或对应 skill 文件
      - 项目级 pattern → wiki/projects/ 笔记
      - 跨项目洞察 → memex 卡片
      注：行为层面的教训走 gradient（beliefs-candidates.md），不直接改 SOUL.md/AGENTS.md。
      只有通过 Triple Verification 毕业的 gradient 才升级到 DNA。

      **beliefs-candidates 升级（如有候选人准备毕业）：**
      - 用独立评分：`bash scripts/evaluate-candidate.sh "<搜索词>"` 生成评估 prompt
      - 交给独立 subagent 执行（不带当前 context）：`claude --print "$(bash scripts/evaluate-candidate.sh '<搜索词>')"`
      - 只有 OVERALL: PASS 才能毕业。自评不算。
      - 如果修改了 SOUL.md / AGENTS.md / HEARTBEAT.md / IDENTITY.md / NUDGE.md：
        1. workspace commit: cd ~/.openclaw/workspace && git add -A && git commit -m "reflect: 简述改了什么"
        2. dna repo 同步: cd ~/.openclaw/workspace/dna && git pull origin master && cp ~/.openclaw/workspace/{SOUL,AGENTS,HEARTBEAT,IDENTITY,NUDGE}.md . && git add -A && git commit -m "reflect: 简述改了什么" && git push origin master

      **处理未兑现的承诺：**
      - 能现在做的 → 直接做
      - 不能现在做的 → 写入 memory/YYYY-MM-DD.md 标记为待办，说明原因

      **最后：**
      - 告诉 Luna 你做了什么、学到了什么（简洁，不要流水账）
    next: gradient_gate

  gradient_gate:
    task: |
      **梯度提取验证门**（结构性强制，不可跳过）

      检查 beliefs-candidates.md 在本轮是否被修改：
      ```
      git -C ~/.openclaw/workspace diff HEAD -- beliefs-candidates.md | head -20
      ```

      如果有 diff（新增了 gradient 条目）→ 通过，继续。
      如果没有 diff → **你跳过了 act 里的梯度提取步骤。现在补写。**

      使用 add-gradient.sh 写入：
      ```
      bash ~/.openclaw/workspace/tools/add-gradient.sh \
        --gradient "具体的行为级教训" \
        --pattern "pattern-name" \
        --source reflect \
        --trigger "什么时候会触发这个问题" \
        --fix "下次怎么做不同"
      ```

      写完后 commit：
      ```
      cd ~/.openclaw/workspace && git add beliefs-candidates.md && git commit -m "gradient: <标题>"
      ```
    branches:
      - condition: "beliefs-candidates.md 已有本轮新增的 gradient"
        next: done
      - condition: "补写完成"
        next: done

  done:
    task: |
      反思完成。回复结果摘要。
    terminal: true

  silent:
    task: |
      确实没有需要反思的内容。回复 HEARTBEAT_OK。
    terminal: true
