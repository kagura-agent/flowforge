name: review
description: "每日进化检查点 — 自检 + 写日志（3:00 AM）"
start: tool_review

nodes:
  tool_review:
    task: |
      工具进化 Review（diff-scoped，只深入检查变更项）。
      
      **第〇步（前置）：审计跟踪 — 检查上次审计修正落实**
      读最近一次 evolution-log 中的审计修正（daily-audit 产出），逐条检查落实状态：
      ```bash
      # 找到最近的 evolution-log 审计条目
      latest_log=$(ls -t ~/.openclaw/workspace/evolution-log/2026-*.md | head -1)
      echo "=== Latest evolution-log: $latest_log ==="
      grep -A2 '🔴\|修正\|行动\|F[0-9]' "$latest_log" | head -30
      ```
      对每条修正：
      - ✅ 已落实 → 一行确认
      - ❌ 未落实 → 本次 review 必须处理或升级为 blocker
      - 连续 2 天未落实的修正 → 红旗，当场执行或 @ Luna
      
      **第一步：运行工具自测**
      ```bash
      bash ~/.openclaw/workspace/tools/tool-selftest.sh
      ```
      如果有失败 → 当场修复（或记 TODO）。全绿 → 继续。

      **第一步：运行 diff pre-check**
      ```bash
      bash ~/.openclaw/workspace/tools/review-diff-check.sh 24
      ```
      这会列出过去 24h 变更的 tool/DNA/workflow/strategy 文件。
      
      **第二步：根据 diff 结果决定深度**
      - NO_CHANGES → 快速验证关键服务在线（版本号 + 磁盘），跳过逐个工具检查
      - 有变更 → 只对变更的文件/工具展开五个问题：
        a. 还在用吗？ b. 好用吗？ c. 还需要吗？ d. 上游更新了吗？ e. 服务到位吗？
      - 无论是否有变更，始终检查：磁盘使用率、cron error 数
      
      **第三步：固定检查项（每次都做，但一行带过）**
      - FlowForge / GoGetAJob / memex 版本 [已验证]
      - Node / Go 版本 [已验证]
      - 根盘使用率 [已验证]
      - cron 错误数 [已验证]
      
      4. 基本纪律：数据必须查、标注 [已验证/未验证]
      5. 🔴 **强制行动闭环**：每标记一个问题，必须同时写出对应行动（创建 TODO 条目 / 提 GitHub issue / 当场 commit 修复）。纯观测不允许——"发现 X 问题"后面必须紧跟"行动：Y"。如果当场无法行动，必须说明具体 blocker 并 @ Luna。
      ⚠️ 目标：控制输出长度，为后续节点留 token 预算。未变更工具不需要任何报告。
      ⚠️ 硬限制：本节点最终输出不超过 30 行。变更工具展开，其余一行带过。
      💡 设计原理：Dreamer "Context Phase only touches what changed" — 不重读未变内容。
    branches:
      - condition: "所有工具都逐个回答了五个问题"
        next: strategy_review

  strategy_review:
    task: |
      战略进化 Review。
      1. 读 wiki/strategy.md（完整内容，这是战略的唯一数据源）
      2. 读最近 2-3 天的 memory，提取 Luna 反复提到的主题和新发现
      3. 对比：战略跟实际行动有偏移吗？有新洞察该纳入吗？
      4. 如果有偏移或需要更新 → 直接编辑 wiki/strategy.md
      5. 同步更新 MEMORY.md 中的战略索引摘要
      6. 引用必须标注来源文件和原文，不要自己归纳后当成别人的话
    branches:
      - condition: "完成"
        next: dna_review

  dna_review:
    task: |
      DNA 进化 Review。
      0. **DNA Overhead Check**: `bash tools/dna-overhead-check.sh` — 检查规则膨胀、重叠、快速路径成本。有 ⚠️ 就处理。
      1. beliefs-candidates.md 有重复 3 次以上该升级的吗？
      2. 过去 24h DNA 变更（git log），行为真的变了吗？
      3. DNA 文件之间一致吗？
      ⚠️ 计数纪律：所有数字必须附原始命令和输出。不可验证的标 [未验证]，不编来源不明的累计值。
    branches:
      - condition: "完成"
        next: beliefs_graduation

  beliefs_graduation:
    task: |
      **Beliefs Graduation Gate — 扫描并执行升级**
      
      0. **跑 graduation-pipeline**（skill-to-skill: gradient-scan → evaluate-candidate 自动桥接）：
         ```bash
         bash ~/.openclaw/workspace/tools/graduation-pipeline.sh --days 14 --threshold 6
         ```
         Pipeline 自动：扫描 memory 找证据 → 筛选 V1 通过的 → 展示候选 + context。
         然后对每个 V1 PASS 的候选手动评估 V2(预测力) + V3(非显而易见)。

      1. 补充：检查 beliefs-candidates.md 中显式标记 "count ≥ 3" 或 "repeated" 的（pipeline 可能漏掉 keyword 定义不完整的）：
         ```bash
         grep -n "count.*[3-9]\|repeated\|3x\|V1.*pass\|第[3-9]次\|第[1-9][0-9]次" ~/.openclaw/workspace/beliefs-candidates.md
         ```
      2. 对每个通过 V1 的候选，评估 V2 + V3：
         - V2 (Predictive Power): 能构造一个具体未来场景吗？如果没有这个 belief，agent 会犯错吗？
         - V3 (Non-obvious): 一个全新 agent 没有这个 belief 会自然犯同样的错吗？
      3. 全部 PASS → 执行升级：
         a. 在 beliefs-candidates.md 中标记 `→ **graduated YYYY-MM-DD** (target: <DNA|Workflow|KB> — <具体位置>)`
         b. 将内容写入目标位置（AGENTS.md / workloop.yaml / wiki/）
         c. git commit
      4. FAIL → 记录理由（哪个 V 没过），不升级
      5. 没有候选 → 报告 "0 candidates at graduation threshold"
      
      ⚠️ 评估必须严格——大多数候选应该 FAIL。只有真正跨场景、有预测力、非显而易见的才升级。
    branches:
      - condition: "完成"
        next: memory_hygiene

  memory_hygiene:
    task: |
      MEMORY.md 记忆卫生（inspired by Claude Code Auto Dream）。
      读 MEMORY.md，执行三项清理：

      1. **去重**：有没有重复章节？（如"新项目"出现多次、同一信息不同位置写了两遍）
         - 合并到一处，删除重复
      2. **去旧**：有没有已被覆盖的旧数据？（如旧的打工成果统计、已退役的工具描述过长）
         - 删除旧版本，只留最新
         - 已暂停/退役的项目压缩到 1-2 行
      3. **归档**：有没有细节过多、该移到 wiki 的内容？
         - 项目的技术细节（功能列表、PR 历史）→ wiki/projects/
         - MEMORY.md 只留索引级描述

      4. **生命周期检查**：运行 `bash tools/memory-lifecycle.sh`
         - Stale promoted entries >14 天 → 归档（删除该行，关键信息已在 wiki/projects/ 或 memory/ 中）
         - Line budget >85% → 必须清理
         - "verify still current" 标记 → 逐条确认是否仍有效

      5. **Wiki 退役扫描**（每周一次，周一 review 时做）：
         - 运行 `bash ~/.openclaw/workspace/wiki/scripts/retire-candidates.sh --threshold 70 --top 10`
         - Score ≥80 的强退役候选人：检查内容，确认无价值后 archive 或 delete
         - Score 60-79 的：标注 status: stale，下次 review 再看
         - 不是每次都要清理——但要看数据，不要凭感觉

      5. **Wiki 重复检测**（每周一次，退役扫描后做）：
         - 运行 `bash ~/.openclaw/workspace/wiki/scripts/overlap-detector.sh --threshold 0.45 --top 10`
         - Jaccard ≥0.5 的：确认是否真重复，merge 或 supersede（保留更新/更完整的）
         - 0.35-0.5 的：检查是否需要 cross-link（[[wikilink]]互相引用）
         - 目的：减少冗余，让检索更精准（同一话题散落多处 = 检索噪音）

      6. **beliefs-candidates 自动退役**（每次 review 都做）：
         - 运行 `bash ~/.openclaw/workspace/tools/beliefs-auto-retract.sh`
         - 自动退役 count=1 且 30+ 天无复现的 gradient 条目
         - 减少管线噪音，让活跃 pattern 更突出
         - 退役后 git commit（如有变更）

      7. **L1.md 自动再生成**（每次 review 都做）：
         - 运行 `bash ~/.openclaw/workspace/wiki/scripts/regen-l1.sh`
         - 自动扫描 659+ wiki notes，按 status/recency/wikilinks 评分，生成 ≤30 行导航索引
         - 取代手动维护 L1.md，保证指针始终指向最相关的笔记

      ⚠️ 编辑文件时：先 read 获取精确内容，再 edit。不要凭记忆猜 oldText。
      每次改动都 git diff --stat 确认，不要误删有价值的信息。
      不设硬行数上限——质量好就留，冗余了就清。
      汇报：清理了什么、删了多少行（用 git diff --stat 验证，不要手算）、现在多少行。
    branches:
      - condition: "完成"
        next: write_log

  write_log:
    task: |
      将 review 结果写入两个地方：
      1. evolution-log/当天日期.md — 完整记录（tool review + strategy review + dna review）
      2. memory/当天日期.md — 结论摘要

      ⚠️⚠️⚠️ 这是最重要的节点 — 写 memory 是这个 workflow 的核心产出。
      即使前面节点的输出很长、context 很满，你也**必须**至少写一条摘要到 memory/YYYY-MM-DD.md。
      宁可摘要只有 3 行，也不能 0 写入。不要空手而归。
      
      **最低要求（无论如何必须完成）：**
      用 exec 工具执行以下命令追加到 memory 文件（这比 edit 更可靠，不需要 oldText）：
      ```bash
      cat >> ~/.openclaw/workspace/memory/$(date +%Y-%m-%d).md << 'REVIEW_EOF'

      ## [Cron] daily-review (03:00)
      - 完成每日进化检查点（tool/strategy/dna/memory-hygiene review）
      - 结果已写入 evolution-log/
      REVIEW_EOF
      ```
      然后再补充具体发现。如果 context 不够写详细内容，至少上面这条必须写入。

      写文件时：先用 read 读取文件当前内容，再用 edit（确保 oldText 精确匹配）或 exec 追加。
      不要凭记忆猜测文件内容作为 oldText，这是 edit 失败的首要原因。

      **同时记录 eval 指标**（追加到 evolution-log/当天日期.md 末尾）：
      ```
      ## Eval Baseline
      ⚠️ **数据新鲜度纪律**：所有 Eval 数据必须当轮重新查询。禁止沿用旧数据标 [已验证]。
      如果因 token/时间限制无法重新查询，必须标 [未验证/沿用 MM-DD 数据]，不得标 [已验证]。
      **工具可用时必须用工具验证**：gogetajob 能跑就必须跑，不允许"工具存在但我选择不用"。
      - PR merge rate: X% decided (N merged / M decided) | Y% total (N merged / P total) — 来源: gogetajob stats [已验证] — ⚠️ 必须当轮跑 `gogetajob stats`，标注双口径（decided=已有结果的 PR, total=含 open）
      - beliefs-candidates total: N gradients + N directives — ⚠️ 必须用以下命令精确计数，区分 gradient 和 directive：
        ```bash
        awk '/graduated [0-9]{4}|retracted [0-9]{4}/ {next} /\[directive\]/ {dir++; next} /\[confirmation\]/ {next} /^## 2026-|^### .*2026-|^- 2026-|^- \*\*2026-/ {grad++} END{print "GRADIENTS:", grad+0, "DIRECTIVES:", dir+0, "TOTAL:", grad+dir+0}' beliefs-candidates.md
        ```
        Gradient = 走 Triple Verification 的行为候选。Directive = Luna 直接指令，不走毕业流程。只有 gradient 计入 "active candidates" 指标。
      - wiki: cards N / projects N — ⚠️ 必须当场跑 `ls | wc -l`，不沿用旧数据：
        ```bash
        echo "cards: $(ls ~/.openclaw/workspace/wiki/cards/ | wc -l), projects: $(ls ~/.openclaw/workspace/wiki/projects/ | wc -l)"
        ```
      - Repeat gradients: N 条（beliefs-candidates.md 中标了 repeated 的）[已验证]
      - DNA graduations: N 次（累计从 candidates 升级到 DNA 的）[已验证]
      ```

      然后 cd ~/.openclaw/workspace/evolution-log && git add -A && git commit && git push

      ⚠️ 不要 spawn 子 agent。所有操作在当前 session 同步完成。
    terminal: true
