name: review
description: "每日进化检查点 — 自检 + 写日志（3:00 AM）"
start: tool_review

nodes:
  tool_review:
    task: |
      工具进化 Review。
      1. 先列出当前所有工具（扫 workspace、cron、插件目录，每个目录都要看）
      2. 对每个工具逐个回答五个问题，每个问题都要实际回答（不能跳过、不能一句话带过）：
         a. 还在用吗？（查数据，标注 [已验证]）
         b. 好用吗？（有没有问题、报错、缺失功能？）
         c. 还需要吗？（需求还在吗？该淘汰吗？）
         d. 上游更新了吗？
         e. 服务到位吗？（服务哪些层？覆盖到了吗？）
      3. 基本纪律：数据必须查、对照源码、标注 [已验证/未验证]
      4. 不确定的工具也要读 README 或源码确认用途，不能说"不确定"就跳过
    branches:
      - condition: "所有工具都逐个回答了五个问题"
        next: strategy_review

  strategy_review:
    task: |
      战略进化 Review。
      1. 读最近 2-3 天的 memory，提取 Luna 反复提到的主题
      2. 跟 MEMORY.md 战略目标对比，有偏移吗？
      3. 引用必须标注来源文件和原文，不要自己归纳后当成别人的话
    branches:
      - condition: "完成"
        next: dna_review

  dna_review:
    task: |
      DNA 进化 Review。
      1. beliefs-candidates.md 有重复 3 次以上该升级的吗？
      2. 过去 24h DNA 变更（git log），行为真的变了吗？
      3. DNA 文件之间一致吗？
    branches:
      - condition: "完成"
        next: write_log

  write_log:
    task: |
      将 review 结果写入两个地方：
      1. evolution-log/当天日期.md — 完整记录（tool review + strategy review + dna review）
      2. memory/当天日期.md — 结论摘要

      **同时记录 eval 指标**（追加到 evolution-log/当天日期.md 末尾）：
      ```
      ## Eval Baseline
      - PR merge rate: X% (N merged / M total) — 来源: gogetajob stats [已验证]
      - beliefs-candidates total: N 条 [已验证]
      - Repeat gradients: N 条（beliefs-candidates.md 中标了 repeated 的）[已验证]
      - DNA graduations: N 次（累计从 candidates 升级到 DNA 的）[已验证]
      ```

      然后 cd ~/.openclaw/workspace/evolution-log && git add -A && git commit && git push

      ⚠️ 不要 spawn 子 agent。所有操作在当前 session 同步完成。
    terminal: true
